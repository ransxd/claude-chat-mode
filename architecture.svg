<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#d2a8ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" rx="16" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="44" text-anchor="middle" font-size="22" font-weight="600" fill="url(#titleGrad)">claude-chat-mode</text>
  <text x="400" y="68" text-anchor="middle" font-size="12" fill="#8b949e">Turn Claude Code into a conversational partner — zero source code changes</text>

  <!-- ═══ Layer 0: User Input ═══ -->
  <rect x="160" y="92" width="480" height="64" rx="10" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="180" y="112" font-size="9" font-weight="600" fill="#d2a8ff" letter-spacing="0.8">LAYER 0</text>
  <text x="400" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#e6edf3">Your Message</text>

  <!-- Arrow down -->
  <line x1="400" y1="156" x2="400" y2="186" stroke="#30363d" stroke-width="2"/>
  <polygon points="394,182 400,192 406,182" fill="#30363d"/>

  <!-- ═══ Layer 1: Routing ═══ -->
  <rect x="120" y="196" width="560" height="80" rx="10" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="218" font-size="9" font-weight="600" fill="#d2a8ff" letter-spacing="0.8">LAYER 1 — ROUTING</text>
  <text x="400" y="242" text-anchor="middle" font-size="14" font-weight="600" fill="#e6edf3">Three-Tier Mode Detection</text>

  <!-- Tags inside routing box -->
  <rect x="174" y="252" width="145" height="18" rx="9" fill="rgba(210,168,255,0.15)"/>
  <text x="246" y="264" text-anchor="middle" font-size="10" fill="#d2a8ff">CLAUDE.md Adaptive</text>
  <rect x="332" y="252" width="60" height="18" rx="9" fill="rgba(88,166,255,0.15)"/>
  <text x="362" y="264" text-anchor="middle" font-size="10" fill="#58a6ff">/chat</text>
  <rect x="405" y="252" width="60" height="18" rx="9" fill="rgba(63,185,80,0.15)"/>
  <text x="435" y="264" text-anchor="middle" font-size="10" fill="#3fb950">/code</text>
  <rect x="478" y="252" width="100" height="18" rx="9" fill="rgba(210,153,34,0.15)"/>
  <text x="528" y="264" text-anchor="middle" font-size="10" fill="#d29922">auto-detect</text>

  <!-- Split arrows -->
  <line x1="300" y1="276" x2="250" y2="316" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="244,312 250,322 256,312" fill="#58a6ff"/>
  <line x1="500" y1="276" x2="550" y2="316" stroke="#3fb950" stroke-width="2"/>
  <polygon points="544,312 550,322 556,312" fill="#3fb950"/>

  <!-- ═══ Layer 2: Two Mode Cards ═══ -->
  <!-- Chat Mode Card -->
  <rect x="60" y="326" width="310" height="150" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="348" font-size="9" font-weight="600" fill="#58a6ff" letter-spacing="0.8">CHAT MODE</text>
  <rect x="80" y="356" width="56" height="16" rx="8" fill="rgba(88,166,255,0.15)"/>
  <text x="108" y="367" text-anchor="middle" font-size="9" fill="#58a6ff">No tools</text>
  <rect x="142" y="356" width="82" height="16" rx="8" fill="rgba(88,166,255,0.15)"/>
  <text x="183" y="367" text-anchor="middle" font-size="9" fill="#58a6ff">Natural prose</text>
  <rect x="230" y="356" width="72" height="16" rx="8" fill="rgba(88,166,255,0.15)"/>
  <text x="266" y="367" text-anchor="middle" font-size="9" fill="#58a6ff">Warm tone</text>
  <rect x="80" y="376" width="86" height="16" rx="8" fill="rgba(88,166,255,0.15)"/>
  <text x="123" y="387" text-anchor="middle" font-size="9" fill="#58a6ff">Deep thinking</text>

  <text x="80" y="410" font-size="11" fill="#8b949e">Replicate the claude.ai chat</text>
  <text x="80" y="425" font-size="11" fill="#8b949e">experience. Tools suppressed</text>
  <text x="80" y="440" font-size="11" fill="#8b949e">unless explicitly requested.</text>
  <text x="80" y="455" font-size="11" fill="#8b949e">Paragraphs, not bullet lists.</text>

  <!-- Code Mode Card -->
  <rect x="430" y="326" width="310" height="150" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="348" font-size="9" font-weight="600" fill="#3fb950" letter-spacing="0.8">CODE MODE</text>
  <rect x="450" y="356" width="56" height="16" rx="8" fill="rgba(63,185,80,0.15)"/>
  <text x="478" y="367" text-anchor="middle" font-size="9" fill="#3fb950">All tools</text>
  <rect x="512" y="356" width="56" height="16" rx="8" fill="rgba(63,185,80,0.15)"/>
  <text x="540" y="367" text-anchor="middle" font-size="9" fill="#3fb950">Concise</text>
  <rect x="574" y="356" width="76" height="16" rx="8" fill="rgba(63,185,80,0.15)"/>
  <text x="612" y="367" text-anchor="middle" font-size="9" fill="#3fb950">Action-first</text>
  <rect x="450" y="376" width="72" height="16" rx="8" fill="rgba(63,185,80,0.15)"/>
  <text x="486" y="387" text-anchor="middle" font-size="9" fill="#3fb950">Workflows</text>

  <text x="450" y="410" font-size="11" fill="#8b949e">Standard Claude Code behavior.</text>
  <text x="450" y="425" font-size="11" fill="#8b949e">Read, Edit, Bash, Grep — all</text>
  <text x="450" y="440" font-size="11" fill="#8b949e">active. Terse responses,</text>
  <text x="450" y="455" font-size="11" fill="#8b949e">immediate action on tasks.</text>

  <!-- Auto-exit dashed arrow -->
  <line x1="250" y1="476" x2="400" y2="510" stroke="#d2a8ff" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="550" y1="476" x2="400" y2="510" stroke="#d2a8ff" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="400" y="498" text-anchor="middle" font-size="10" fill="#d2a8ff" font-style="italic">auto-exit: coding task detected</text>

  <!-- ═══ Layer 3: Output ═══ -->
  <rect x="160" y="520" width="480" height="72" rx="10" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="180" y="542" font-size="9" font-weight="600" fill="#d2a8ff" letter-spacing="0.8">LAYER 2 — OUTPUT</text>
  <text x="400" y="564" text-anchor="middle" font-size="14" font-weight="600" fill="#e6edf3">Seamless Response</text>
  <text x="400" y="580" text-anchor="middle" font-size="11" fill="#8b949e">One continuous conversation. Mode switches are invisible to the user.</text>
</svg>
